name: E2E smoke test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/e2e-smoke-test.yml'
      - 'scripts/e2e_smoke_test.py'

concurrency:
  group: e2e-smoke-test
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v5

      - name: Run n8n to Slack proposal smoke test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          N8N_API_TOKEN: ${{ secrets.N8N_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python3 scripts/e2e_smoke_test.py --wait-seconds 180 --poll-interval 10
